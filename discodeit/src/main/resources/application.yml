spring:
  profiles:
    active: dev
  application:
    name: discodeit
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
discodeit:
  repository:
    type: file
    file-directory: .discodeit
  storage:
    type: local
    local:
      root-path: ./upload
server:
  port: ${PORT:8080}
logging:
  level:
    com.sprint.mission.discodeit: INFO
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
info:
  app:
    name: Discodeit
    version: 1.7.0
    java-version: 17
    spring-boot-version: 3.4.0
  settings:
    datasource:
      url: ${spring.datasource.url:N/A}
      driver: ${spring.datasource.driver-class-name:N/A}
    jpa:
      ddl-auto: ${spring.jpa.hibernate.ddl-auto:N/A}
    storage:
      type: ${discodeit.repository.type:N/A}
      path: ${discodeit.storage.local.root-path:N/A}
    multipart:
      max-file-size: ${spring.servlet.multipart.max-file-size:N/A}
      max-request-size: ${spring.servlet.multipart.max-request-size:N/A}

